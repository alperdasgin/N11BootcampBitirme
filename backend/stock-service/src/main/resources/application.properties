server.port=8086
spring.application.name=stock-service

spring.datasource.url=jdbc:postgresql://localhost:5432/stockdb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

stock.rabbit.exchange=stock.events.exchange
stock.rabbit.reserveRequestedQueue=stock.reserve.requested.queue
stock.rabbit.reserveRequestedRoutingKey=order.stock.reserve.requested
stock.rabbit.reservedRoutingKey=order.stock.reserved
stock.rabbit.rejectedRoutingKey=order.stock.rejected
stock.rabbit.dlx=
stock.rabbit.dlq=

# Product → Stock sync events (product-service publish eder, biz dinleriz)
product.sync.exchange=product.sync.exchange
product.sync.queue=product.sync.queue.stock
product.sync.routingKeyPattern=product.sync.*

# Persistence: @PreDestroy export hedefi
app.export.dir=${EXPORT_DIR:./exports}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html