server.port=8086
spring.application.name=stock-service

spring.datasource.url=jdbc:postgresql://localhost:5432/stockdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

stock.rabbit.exchange=stock.events.exchange
stock.rabbit.reserveRequestedQueue=stock.reserve.requested.queue
stock.rabbit.reserveRequestedRoutingKey=order.stock.reserve.requested
stock.rabbit.reservedRoutingKey=order.stock.reserved
stock.rabbit.rejectedRoutingKey=order.stock.rejected
stock.rabbit.dlx=
stock.rabbit.dlq=