server.port=8082
spring.application.name=product-service

spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.ecommerce=DEBUG

# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s

# RabbitMQ (Product → Stock sync events)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

product.sync.exchange=product.sync.exchange
product.sync.routingKey.created=product.sync.created
product.sync.routingKey.updated=product.sync.updated
product.sync.routingKey.deleted=product.sync.deleted

# Persistence: @PreDestroy export hedefi (host'tan volume mount edilir)
app.export.dir=${EXPORT_DIR:./exports}