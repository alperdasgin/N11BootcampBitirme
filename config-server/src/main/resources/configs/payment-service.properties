server.port=8085
spring.application.name=payment-service

spring.datasource.url=jdbc:postgresql://localhost:5432/paymentdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Iyzico sandbox bilgileri
iyzico.api-key=sandbox-your-api-key
iyzico.secret-key=sandbox-your-secret-key
iyzico.base-url=https://sandbox-api.iyzipay.com