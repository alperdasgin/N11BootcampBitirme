
services:

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ecommerce-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Discovery Server (Eureka) ────────────────────────────
  discovery-server:
    build: ./backend/discovery-server
    container_name: ecommerce-discovery
    restart: on-failure
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── Config Server ────────────────────────────────────────
  config-server:
    build: ./backend/config-server
    container_name: ecommerce-config
    restart: on-failure
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── API Gateway ──────────────────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    container_name: ecommerce-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── User Service ─────────────────────────────────────────
  user-service:
    build: ./backend/user-service
    container_name: ecommerce-user
    restart: on-failure
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── Product Service ──────────────────────────────────────
  product-service:
    build: ./backend/product-service
    container_name: ecommerce-product
    restart: on-failure
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/productdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EXPORT_DIR=/app/exports
    volumes:
      - ./backend/exports:/app/exports
    networks:
      - ecommerce-network

  # ─── Cart Service ─────────────────────────────────────────
  cart-service:
    build: ./backend/cart-service
    container_name: ecommerce-cart
    restart: on-failure
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cartdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── Order Service ────────────────────────────────────────
  order-service:
    build: ./backend/order-service
    container_name: ecommerce-order
    restart: on-failure
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── Payment Service ──────────────────────────────────────
  payment-service:
    build: ./backend/payment-service
    container_name: ecommerce-payment
    restart: on-failure
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/paymentdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── Stock Service ────────────────────────────────────────
  stock-service:
    build: ./backend/stock-service
    container_name: ecommerce-stock
    restart: on-failure
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/stockdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - EXPORT_DIR=/app/exports
    volumes:
      - ./backend/exports:/app/exports
    networks:
      - ecommerce-network

  # ─── Notification Service ─────────────────────────────────
  notification-service:
    build: ./backend/notification-service
    container_name: ecommerce-notification
    restart: on-failure
    ports:
      - "8087:8087"
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ecommerce-network

  # ─── MCP Service ──────────────────────────────────────────
  mcp-service:
    build: ./backend/mcp-service
    container_name: ecommerce-mcp
    restart: on-failure
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - CONFIG_URI=http://config-server:8888
      - MCP_PRODUCT_SERVICE_URL=http://product-service:8082
    networks:
      - ecommerce-network

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    restart: on-failure
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:

networks:
  ecommerce-network:
    driver: bridge
