server.port=8084
spring.application.name=order-service

spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

stock.rabbit.exchange=stock.events.exchange
stock.rabbit.reserveRequestedRoutingKey=order.stock.reserve.requested
stock.rabbit.reservedRoutingKey=order.stock.reserved
stock.rabbit.rejectedRoutingKey=order.stock.rejected
order.rabbit.stockReservedQueue=order.stock.reserved.queue
order.rabbit.stockRejectedQueue=order.stock.rejected.queue
rabbitmq.exchange=orders.exchange
rabbitmq.queue=order.created.queue
rabbitmq.routingkey=order.created
rabbitmq.dlx.exchange=orders.dlx.exchange
rabbitmq.dlq.queue=order.created.dlq
rabbitmq.dlq.routingkey=order.created.dead

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Feign + Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.payment-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.payment-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.payment-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.payment-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.retry.instances.payment-service.max-attempts=2
resilience4j.retry.instances.payment-service.wait-duration=1s
resilience4j.timelimiter.configs.default.timeout-duration=15s
resilience4j.timelimiter.instances.payment-service.timeout-duration=15s